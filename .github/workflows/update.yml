name: Update feeds

on:
  schedule:
    # 每天 UTC 15:00 = 北京时间 23:00
    - cron: '0 15 * * *'
  workflow_dispatch:        # 允许手动触发,方便测试

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest feeds
        run: node scripts/fetch-all.mjs

      - name: Commit data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore: update feeds $(date -u +%F)"
            git push
          fi
